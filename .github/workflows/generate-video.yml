name: Generate IQRHQ Video

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'موضوع الاعلان بالعربي'
        required: true
        default: 'مطعم يخسر فلوس بسبب الهدر'
        type: string
      variation:
        description: 'الزاوية: 1=الم عاطفي 2=خسارة مالية 3=حل وامل'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-cairo || sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Install packages
        run: npm ci

      - name: Create directories
        run: mkdir -p output temp requests

      - name: Generate Video
        id: gen
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL:          llama-3.3-70b-versatile
          ELEVENLABS_API_KEY:  ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          TOPIC:               ${{ github.event.inputs.topic }}
          VARIATION:           ${{ github.event.inputs.variation }}
          LOG_LEVEL:           info
        run: node scripts/generate.js

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iqrhq-video-${{ steps.gen.outputs.job_id }}
          path: |
            output/*.mp4
            output/*.mp3
            output/*_script.json
          retention-days: 7
          if-no-files-found: error
