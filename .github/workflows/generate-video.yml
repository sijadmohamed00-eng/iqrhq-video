name: 🎬 Generate IQRHQ Video

on:
  # ── Manual trigger from GitHub UI ──────────────────────────────────────────
  workflow_dispatch:
    inputs:
      topic:
        description: 'موضوع الإعلان بالعربي'
        required: true
        default: 'مطعم يخسر فلوس بسبب الهدر'
        type: string
      variation:
        description: 'نوع الزاوية'
        required: true
        default: '1'
        type: choice
        options:
          - '1'   # ألم عاطفي
          - '2'   # خسارة مالية
          - '3'   # حل وأمل
      add_music:
        description: 'أضف موسيقى خلفية'
        required: false
        default: 'true'
        type: boolean

  # ── Scheduled: every day at 9am Baghdad time (UTC+3 = 06:00 UTC) ────────────
  # schedule:
  #   - cron: '0 6 * * *'

jobs:
  generate-video:
    name: Generate Video — "${{ github.event.inputs.topic }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ──────────────────────────────────────────────────
      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install FFmpeg ─────────────────────────────────────────────────
      - name: 🎞️ Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-noto-color-emoji
          # Install Cairo Arabic font for subtitles
          sudo apt-get install -y fonts-cairo || sudo apt-get install -y fonts-arabeyes || true
          ffmpeg -version

      # ── 4. Install dependencies ───────────────────────────────────────────
      - name: 📦 Install npm packages
        run: npm ci

      # ── 5. Create required directories ───────────────────────────────────
      - name: 📁 Create directories
        run: |
          mkdir -p output temp requests
          # Create empty pending.json if not exists
          [ -f requests/pending.json ] || echo "[]" > requests/pending.json

      # ── 6. Generate video ─────────────────────────────────────────────────
      - name: 🎬 Generate Video
        id: generate
        env:
          GROQ_API_KEY:              ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL:                llama-3.3-70b-versatile
          ELEVENLABS_API_KEY:        ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID:       ${{ secrets.ELEVENLABS_VOICE_ID }}
          ELEVENLABS_VOICE_ARABIC:   ${{ secrets.ELEVENLABS_VOICE_ID }}
          ELEVENLABS_VOICE_ARABIC_F: ${{ secrets.ELEVENLABS_VOICE_ARABIC_F }}
          TOPIC:                     ${{ github.event.inputs.topic }}
          VARIATION:                 ${{ github.event.inputs.variation }}
          ADD_MUSIC:                 ${{ github.event.inputs.add_music }}
          LOG_LEVEL:                 info
        run: node scripts/generate.js

      # ── 7. Upload output as artifact ──────────────────────────────────────
      - name: 📤 Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iqrhq-video-${{ steps.generate.outputs.job_id }}
          path: |
            output/*.mp4
            output/*.mp3
            output/*_script.json
          retention-days: 7
          if-no-files-found: error

      # ── 8. Print summary ──────────────────────────────────────────────────
      - name: 📊 Job Summary
        if: always()
        run: |
          echo "## 🎬 IQRHQ Video Generation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Topic | ${{ github.event.inputs.topic }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Variation | ${{ github.event.inputs.variation }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Job ID | ${{ steps.generate.outputs.job_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | ${{ steps.generate.outputs.duration }}s |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Download the video from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ls -lah output/ 2>/dev/null || echo "No output files found"
